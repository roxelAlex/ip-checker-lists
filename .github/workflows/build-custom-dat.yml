name: Build ipcheck-list artifacts

on:
  push:
    paths:
      - 'data/ipcheck-list'
      - '.github/workflows/build-ipcheck-list.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone domain-list-community
        run: git clone https://github.com/v2fly/domain-list-community.git dlc

      - name: Build ipcheck-list.dat
        run: |
          cd dlc
          go mod download
          go run ./ --datapath="${GITHUB_WORKSPACE}/data"
          cp dlc.dat "${GITHUB_WORKSPACE}/ipcheck-list.dat"

      - name: Build ipcheck-list.txt and ipcheck-list.json
        run: |
          python3 <<'PY'
          import json
          from pathlib import Path

          src = Path("data/ipcheck-list")
          txt_out = Path("ipcheck-list.txt")
          json_out = Path("ipcheck-list.json")

          domains = []
          txt_lines = []

          for raw in src.read_text(encoding="utf-8").splitlines():
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue

              if line.startswith("domain:"):
                  domain = line[len("domain:"):].strip()
              else:
                  domain = line.strip()

              if not domain:
                  continue

              domains.append(domain)
              txt_lines.append(f".{domain}")

          txt_out.write_text("\n".join(txt_lines) + "\n", encoding="utf-8")

          data = {
              "version": 3,
              "rules": [
                  {
                      "domain_suffix": domains
                  }
              ]
          }

          json_out.write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Install sing-box
        run: curl -fsSL https://sing-box.app/install.sh | sudo bash

      - name: Build ipcheck-list.srs
        run: sing-box rule-set compile --output ipcheck-list.srs ipcheck-list.json

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ipcheck-list.dat ipcheck-list.txt ipcheck-list.json ipcheck-list.srs
          git diff --cached --quiet && exit 0
          git commit -m "Update ipcheck-list artifacts"
          git push
