name: Build ipcheck-list artifacts

on:
  push:
    paths:
      - 'data/ipcheck-list'
      - '.github/workflows/build-ipcheck-list.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone domain-list-community
        run: git clone https://github.com/v2fly/domain-list-community.git dlc

      - name: Build ipcheck-list.dat
        run: |
          cd dlc
          go mod download
          go run ./ --datapath="${GITHUB_WORKSPACE}/data"
          cp dlc.dat "${GITHUB_WORKSPACE}/ipcheck-list.dat"

      - name: Build ipcheck-list.json and ipcheck-list.mihomo.txt
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          src = Path("data/ipcheck-list")
          json_out = Path("ipcheck-list.json")
          mihomo_txt_out = Path("ipcheck-list.mihomo.txt")

          domains = []
          mihomo_lines = []

          for raw in src.read_text(encoding="utf-8").splitlines():
              line = raw.strip()
              if not line or line.startswith("#"):
                  continue

              if line.startswith("domain:"):
                  domain = line[len("domain:"):].strip()
              else:
                  domain = line

              if not domain:
                  continue

              domains.append(domain)
              mihomo_lines.append(f".{domain}")

          data = {
              "version": 3,
              "rules": [
                  {
                      "domain_suffix": domains
                  }
              ]
          }

          json_out.write_text(
              json.dumps(data, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )
          mihomo_txt_out.write_text(
              "\n".join(mihomo_lines) + "\n",
              encoding="utf-8"
          )
          PY

      - name: Install sing-box
        run: curl -fsSL https://sing-box.app/install.sh | sudo bash

      - name: Build ipcheck-list.srs
        run: sing-box rule-set compile --output ipcheck-list.srs ipcheck-list.json

      - name: Resolve latest mihomo binary URL
        run: |
          python3 - <<'PY' > mihomo_url.txt
          import json
          import urllib.request

          api = "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest"
          with urllib.request.urlopen(api) as r:
              data = json.load(r)

          url = None
          for asset in data.get("assets", []):
              name = asset.get("name", "")
              if name.startswith("mihomo-linux-amd64") and name.endswith(".gz"):
                  url = asset["browser_download_url"]
                  break

          if not url:
              raise SystemExit("No suitable mihomo linux amd64 asset found")

          print(url)
          PY

      - name: Download mihomo binary
        run: |
          curl -fsSL "$(cat mihomo_url.txt)" -o mihomo.gz
          gunzip -f mihomo.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/mihomo

      - name: Build ipcheck-list.mrs
        run: mihomo convert-ruleset domain text ipcheck-list.mihomo.txt ipcheck-list.mrs

      - name: Cleanup temporary files
        run: rm -f mihomo_url.txt ipcheck-list.mihomo.txt

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ipcheck-list.dat ipcheck-list.json ipcheck-list.srs ipcheck-list.mrs
          git diff --cached --quiet && exit 0
          git commit -m "Update ipcheck-list artifacts"
          git push
